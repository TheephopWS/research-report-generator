<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Research Report Generator</title>
<style>
  :root {
    --bg:       #0d0d0f;
    --surface:  #151518;
    --surface2: #1c1c21;
    --border:   #2a2a32;
    --border2:  #38383f;
    --text:     #e0dbd2;
    --muted:    #6b6875;
    --dim:      #3e3d48;
    --blue:     #5b8fd4;
    --blue-dim: #1a2d4a;
    --green:    #52a876;
    --green-dim:#142b1e;
    --amber:    #c8914a;
    --amber-dim:#2e2010;
    --red:      #bf5f5f;
    --red-dim:  #2e1212;
    --purple:   #8b74c9;
    --purple-dim:#1e1833;
    --teal:     #4aacaa;
    --teal-dim: #0e2928;
    --radius:   10px;
    --mono:     'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    --sans:     'Inter', system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 2rem 1.5rem;
    line-height: 1.6;
  }

  /* ── Header ── */
  .header {
    max-width: 960px;
    margin: 0 auto 2rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.25rem;
  }
  .header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: .25rem;
  }
  .header p { color: var(--muted); font-size: .875rem; }
  .badge {
    display: inline-block;
    font-size: .7rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .badge-agents { background: var(--purple-dim); color: var(--purple); }

  /* ── Layout ── */
  .layout {
    max-width: 960px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 1rem;
    align-items: start;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.125rem 1.25rem;
  }
  .card-label {
    font-size: .7rem;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: .75rem;
  }

  /* ── Form ── */
  textarea, input[type=range] { display: block; width: 100%; }
  textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: .875rem;
    padding: .6rem .75rem;
    resize: vertical;
    line-height: 1.5;
    transition: border-color .15s;
    min-height: 80px;
  }
  textarea:focus { outline: none; border-color: var(--border2); }
  textarea:disabled { opacity: .5; }
  textarea::placeholder { color: var(--dim); }

  .range-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: .8rem;
    color: var(--muted);
    margin-bottom: .35rem;
  }
  .range-val { color: var(--text); font-weight: 600; }
  input[type=range] {
    accent-color: var(--blue);
    height: 2px;
    cursor: pointer;
    margin-bottom: .25rem;
  }
  input[type=range]:disabled { opacity: .45; cursor: not-allowed; }
  .range-hints {
    display: flex;
    justify-content: space-between;
    font-size: .7rem;
    color: var(--dim);
  }

  /* ── Button ── */
  .btn {
    width: 100%;
    padding: .65rem 0;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: .875rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s, transform .08s;
    margin-top: .75rem;
  }
  .btn:hover:not(:disabled) { opacity: .88; }
  .btn:active:not(:disabled) { transform: scale(.98); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .btn-dl {
    width: auto;
    padding: .35rem .9rem;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text);
    font-size: .8rem;
    cursor: pointer;
    transition: background .15s;
    margin-top: 0;
  }
  .btn-dl:hover { background: var(--surface2); }

  /* ── Error ── */
  .error-msg {
    margin-top: .6rem;
    padding: .5rem .75rem;
    background: var(--red-dim);
    border: 1px solid var(--red);
    border-radius: 7px;
    color: var(--red);
    font-size: .8rem;
  }

  /* ── Pipeline ── */
  .pipeline { display: flex; flex-direction: column; gap: 0; }
  .agent-step {
    display: flex;
    gap: .625rem;
    position: relative;
  }
  .agent-connector {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    padding-top: 4px;
  }
  .agent-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--dim);
    transition: background .25s;
    flex-shrink: 0;
    position: relative;
  }
  .agent-dot.running  { background: var(--amber); animation: pulse-dot 1.2s ease-in-out infinite; }
  .agent-dot.done     { background: var(--green); }
  .agent-dot.error    { background: var(--red); }
  .agent-line {
    width: 1px;
    flex: 1;
    min-height: 18px;
    background: var(--border);
    margin: 3px 0;
  }
  .agent-info { padding-bottom: .75rem; flex: 1; }
  .agent-info-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2px;
  }
  .agent-name { font-size: .8rem; font-weight: 500; }
  .agent-desc { font-size: .72rem; color: var(--muted); }
  .status-pill {
    font-size: .65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    padding: 2px 7px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .pill-idle    { background: var(--surface2); color: var(--muted); }
  .pill-running { background: var(--amber-dim); color: var(--amber); }
  .pill-done    { background: var(--green-dim); color: var(--green); }
  .pill-error   { background: var(--red-dim);   color: var(--red); }

  /* ── Log panel ── */
  .log-panel {
    display: flex;
    flex-direction: column;
    gap: .75rem;
    max-height: 420px;
    overflow-y: auto;
    padding-right: 2px;
  }
  .log-entry {}
  .log-header {
    display: flex;
    align-items: center;
    gap: .5rem;
    margin-bottom: .4rem;
  }
  .log-tag {
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .tag-search    { background: var(--blue-dim);   color: var(--blue); }
  .tag-summarizer{ background: var(--green-dim);  color: var(--green); }
  .tag-synthesizer{ background: var(--purple-dim);color: var(--purple); }
  .tag-critic    { background: var(--amber-dim);  color: var(--amber); }
  .tag-formatter { background: var(--teal-dim);   color: var(--teal); }
  .log-running-text {
    font-size: .8rem;
    color: var(--amber);
    animation: pulse-dot 1.2s ease-in-out infinite;
  }
  .log-body {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .7rem .9rem;
    font-size: .85rem;
    line-height: 1.65;
    color: var(--text);
    max-height: 200px;
    overflow-y: auto;
  }
  .log-placeholder {
    color: var(--dim);
    font-size: .85rem;
    padding: 1.25rem 0;
  }

  /* ── Report ── */
  .report-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: .75rem;
  }
  .report-body {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .9rem 1rem;
    font-size: .85rem;
    line-height: 1.7;
    color: var(--text);
    max-height: 420px;
    overflow-y: auto;
  }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── Animations ── */
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50%       { opacity: .35; }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .btn.spinning {
    position: relative;
  }
  .btn.spinning::after {
    content: '';
    display: inline-block;
    width: 14px;
    height: 14px;
    margin-left: 8px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
  }

  /* ── GitHub Markdown ── */
  .markdown-body {
    font-family: var(--sans);
    font-size: .85rem;
    line-height: 1.7;
    color: var(--text);
    word-wrap: break-word;
  }
  .markdown-body > *:first-child { margin-top: 0; }
  .markdown-body > *:last-child { margin-bottom: 0; }
  .markdown-body h1 {
    font-size: 1.5em;
    font-weight: 600;
    margin: 1.5em 0 .75em;
    padding-bottom: .3em;
    border-bottom: 1px solid var(--border);
  }
  .markdown-body h2 {
    font-size: 1.25em;
    font-weight: 600;
    margin: 1.25em 0 .65em;
    padding-bottom: .25em;
    border-bottom: 1px solid var(--border);
  }
  .markdown-body h3 {
    font-size: 1.1em;
    font-weight: 600;
    margin: 1em 0 .5em;
  }
  .markdown-body h4, .markdown-body h5, .markdown-body h6 {
    font-size: 1em;
    font-weight: 600;
    margin: .75em 0 .4em;
  }
  .markdown-body p { margin: 0 0 .75em; }
  .markdown-body a { color: var(--blue); text-decoration: none; }
  .markdown-body a:hover { text-decoration: underline; }
  .markdown-body strong { font-weight: 600; }
  .markdown-body em { font-style: italic; }
  .markdown-body ul, .markdown-body ol {
    margin: 0 0 .75em;
    padding-left: 1.75em;
  }
  .markdown-body li { margin: .25em 0; }
  .markdown-body ul { list-style-type: disc; }
  .markdown-body ol { list-style-type: decimal; }
  .markdown-body code {
    background: rgba(110,118,129,0.15);
    padding: .15em .35em;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: .9em;
  }
  .markdown-body pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: .85em 1em;
    overflow-x: auto;
    margin: 0 0 .75em;
  }
  .markdown-body pre code {
    background: none;
    padding: 0;
    border-radius: 0;
    font-size: .85em;
    line-height: 1.5;
  }
  .markdown-body blockquote {
    border-left: 3px solid var(--border2);
    padding: .1em 0 .1em .85em;
    margin: 0 0 .75em;
    color: var(--muted);
  }
  .markdown-body blockquote > p { margin-bottom: .4em; }
  .markdown-body table {
    border-collapse: collapse;
    width: 100%;
    margin: 0 0 .75em;
    font-size: .85em;
  }
  .markdown-body th, .markdown-body td {
    border: 1px solid var(--border);
    padding: .45em .7em;
    text-align: left;
  }
  .markdown-body th {
    background: var(--surface);
    font-weight: 600;
  }
  .markdown-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.25em 0;
  }
  .markdown-body img { max-width: 100%; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .layout { grid-template-columns: 1fr; }
    body { padding: 1rem; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
</head>
<body>

<div class="header">
  <h1>Research Report Generator</h1>
</div>

<div class="layout">

  <!-- LEFT: Input + Pipeline -->
  <div style="display:flex;flex-direction:column;gap:.875rem;">

    <!-- Input card -->
    <div class="card">
      <div class="card-label">Topic</div>
      <textarea id="topic" rows="4"
        placeholder="e.g. Impact of microplastics on marine food chains"></textarea>

      <div style="margin-top:.875rem;">
        <div class="range-row">
          <span>Sources</span>
          <span class="range-val" id="n-display">3</span>
        </div>
        <input type="range" id="n-sources" min="2" max="6" step="1" value="3"/>
        <div class="range-hints"><span>2 - faster</span><span>6 - richer</span></div>
      </div>

      <button class="btn" id="run-btn" onclick="runPipeline()">
        Generate report
      </button>
      <div class="error-msg" id="error-box" style="display:none;"></div>
    </div>

    <!-- Pipeline status card -->
    <div class="card">
      <div class="card-label">Agent pipeline</div>
      <div class="pipeline" id="pipeline-steps"></div>
    </div>

  </div>

  <!-- RIGHT: Log + Report -->
  <div style="display:flex;flex-direction:column;gap:.875rem;">

    <!-- Agent log -->
    <div class="card">
      <div class="card-label">Agent reasoning log</div>
      <div class="log-panel" id="log-panel">
        <p class="log-placeholder">Agent outputs will appear here as each step completes...</p>
      </div>
    </div>

    <!-- Report (hidden until ready) -->
    <div class="card" id="report-card" style="display:none;">
      <div class="report-header">
        <div class="card-label" style="margin-bottom:0;">Final report</div>
        <div style="display:flex;gap:.5rem;">
          <button class="btn-dl" onclick="downloadReport()">Download .md</button>
          <button class="btn-dl" id="latex-btn" onclick="downloadLatex()" style="display:none;">Download .tex</button>
        </div>
      </div>
      <div class="report-body markdown-body" id="report-body"></div>
    </div>

  </div>
</div>

<script>
const AGENTS = [
  { id:"search",      name:"Search Agent",  desc:"Finds sources on the web",               tagClass:"tag-search" },
  { id:"summarizer",  name:"Summarizer",    desc:"Distils key insights from each source",  tagClass:"tag-summarizer" },
  { id:"synthesizer", name:"Synthesizer",   desc:"Weaves sources into a narrative",         tagClass:"tag-synthesizer" },
  { id:"critic",      name:"Critic",        desc:"Audits quality and fills gaps",           tagClass:"tag-critic" },
  { id:"formatter",   name:"Formatter",     desc:"Composes the final Markdown report",      tagClass:"tag-formatter" },
];

let reportText = "";
let latexContent = "";
let running = false;

// Build pipeline steps on load
function buildPipeline() {
  const el = document.getElementById("pipeline-steps");
  el.innerHTML = AGENTS.map((a, i) => `
    <div class="agent-step" id="step-${a.id}">
      <div class="agent-connector">
        <div class="agent-dot" id="dot-${a.id}"></div>
        ${i < AGENTS.length - 1 ? '<div class="agent-line"></div>' : ""}
      </div>
      <div class="agent-info">
        <div class="agent-info-row">
          <span class="agent-name">${a.name}</span>
          <span class="status-pill pill-idle" id="pill-${a.id}">idle</span>
        </div>
        <div class="agent-desc">${a.desc}</div>
      </div>
    </div>
  `).join("");
}

function setAgentStatus(id, status) {
  const dot  = document.getElementById(`dot-${id}`);
  const pill = document.getElementById(`pill-${id}`);
  if (!dot || !pill) return;
  dot.className  = `agent-dot ${status}`;
  pill.className = `status-pill pill-${status}`;
  pill.textContent = status;
}

function addLogEntry(agent, runningMsg) {
  const panel = document.getElementById("log-panel");
  // Remove placeholder on first entry
  const ph = panel.querySelector(".log-placeholder");
  if (ph) ph.remove();

  const div = document.createElement("div");
  div.className = "log-entry";
  div.id = `log-${agent.id}`;
  div.innerHTML = `
    <div class="log-header">
      <span class="log-tag ${agent.tagClass}">${agent.name}</span>
      <span class="log-running-text" id="log-running-${agent.id}">${runningMsg}</span>
    </div>
    <div class="log-body markdown-body" id="log-body-${agent.id}" style="display:none;"></div>
  `;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
}

function finaliseLogEntry(id, output) {
  const runEl  = document.getElementById(`log-running-${id}`);
  const bodyEl = document.getElementById(`log-body-${id}`);
  if (runEl)  runEl.style.display = "none";
  if (bodyEl) {
    bodyEl.innerHTML = DOMPurify.sanitize(marked.parse(output));
    bodyEl.style.display = "block";
  }
  const panel = document.getElementById("log-panel");
  panel.scrollTop = panel.scrollHeight;
}

function showError(msg) {
  const el = document.getElementById("error-box");
  el.textContent = msg;
  el.style.display = "block";
}

function downloadReport() {
  const blob = new Blob([reportText], { type:"text/markdown" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  const slug = document.getElementById("topic").value.trim().replace(/\s+/g,"_").slice(0,40) || "report";
  a.href = url;
  a.download = `${slug}_report.md`;
  a.click();
  URL.revokeObjectURL(url);
}

function downloadLatex() {
  const blob = new Blob([latexContent], { type:"application/x-latex" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  const slug = document.getElementById("topic").value.trim().replace(/\s+/g,"_").slice(0,40) || "report";
  a.href = url;
  a.download = `${slug}_report.tex`;
  a.click();
  URL.revokeObjectURL(url);
}

async function runPipeline() {
  const topic = document.getElementById("topic").value.trim();
  const n     = parseInt(document.getElementById("n-sources").value, 10);

  running = true;
  reportText = "";
  latexContent = "";
  const runBtn = document.getElementById("run-btn");
  runBtn.disabled = true;
  runBtn.textContent = "Generating";
  runBtn.classList.add("spinning");
  document.getElementById("topic").disabled = true;
  document.getElementById("n-sources").disabled = true;
  document.getElementById("error-box").style.display = "none";
  document.getElementById("report-card").style.display = "none";
  document.getElementById("latex-btn").style.display = "none";
  document.getElementById("log-panel").innerHTML = '<p class="log-placeholder">Agent outputs will appear here as each step completes...</p>';

  // Reset all agent statuses
  AGENTS.forEach(a => setAgentStatus(a.id, "idle"));

  const agentMap = Object.fromEntries(AGENTS.map(a => [a.id, a]));

  try {
    const response = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ topic, num_sources: n }),
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.detail || "Server error");
    }

    const reader  = response.body.getReader();
    const decoder = new TextDecoder();
    let   buffer  = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop(); // keep incomplete last line

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const raw = line.slice(6).trim();
        if (raw === "[DONE]") break;

        let event;
        try { event = JSON.parse(raw); } catch { continue; }

        if (event.type === "agent_start") {
          const a = agentMap[event.agent];
          if (a) {
            setAgentStatus(event.agent, "running");
            addLogEntry(a, event.message);
          }
        } else if (event.type === "agent_done") {
          setAgentStatus(event.agent, "done");
          finaliseLogEntry(event.agent, event.output);
        } else if (event.type === "agent_error") {
          setAgentStatus(event.agent, "error");
          finaliseLogEntry(event.agent, "Error: " + event.message);
          showError(`Agent "${event.agent}" failed: ${event.message}`);
        } else if (event.type === "report") {
          reportText = event.content;
          document.getElementById("report-body").innerHTML = DOMPurify.sanitize(marked.parse(reportText));
          document.getElementById("report-card").style.display = "block";
          document.getElementById("report-card").scrollIntoView({ behavior: "smooth" });
        } else if (event.type === "latex") {
          latexContent = event.content;
          document.getElementById("latex-btn").style.display = "inline-block";
        }
      }
    }
  } catch (err) {
    showError(err.message);
  } finally {
    running = false;
    const doneBtn = document.getElementById("run-btn");
    doneBtn.disabled  = false;
    doneBtn.textContent = "Generate report";
    doneBtn.classList.remove("spinning");
    document.getElementById("topic").disabled    = false;
    document.getElementById("n-sources").disabled = false;
  }
}

// Range display
document.getElementById("n-sources").addEventListener("input", function () {
  document.getElementById("n-display").textContent = this.value;
});

// Allow Ctrl+Enter to submit
document.getElementById("topic").addEventListener("keydown", function (e) {
  if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) runPipeline();
});

buildPipeline();
</script>
</body>
</html>
